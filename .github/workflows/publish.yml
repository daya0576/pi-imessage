name: Publish Package

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: npm ci

      - run: npm publish --access public --provenance || true

      - name: Show npm debug log
        if: always()
        run: cat ~/.npm/_logs/*.log 2>/dev/null | tail -100
